# HTTP — only used for ACME challenge + redirect
server {
    listen 80;
    server_name my.datadinosaur.com datadinosaur.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://my.datadinosaur.com$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name my.datadinosaur.com;

    root /var/www/html;
    index index.php;

    ssl_certificate     /etc/letsencrypt/live/my.datadinosaur.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/my.datadinosaur.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                              always;
    add_header X-Frame-Options           "SAMEORIGIN"                           always;
    add_header X-XSS-Protection          "1; mode=block"                        always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()" always;

    # Block sensitive files
    location ~ /\.(env|git|yaml|json|sql|md|sh|ini|lock)$ { deny all; return 404; }
    location ~ ^/(src|vendor|scripts)/ { deny all; return 404; }

    # Static assets — long cache
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Rate-limit login API
    location = /api/auth {
        limit_req zone=login burst=3 nodelay;
        try_files $uri /index.php?$query_string;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/index.php;
    }

    # Rate-limit contact API
    location = /api/contact {
        limit_req zone=contact burst=2 nodelay;
        try_files $uri /index.php?$query_string;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/index.php;
    }

    # All other requests
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass  php:9000;
        fastcgi_index index.php;
        include       fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_read_timeout 60;
    }
}
