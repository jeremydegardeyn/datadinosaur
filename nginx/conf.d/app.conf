# HTTP — only used for ACME challenge + redirect
server {
    listen 80;
    server_name my.datadinosaur.com datadinosaur.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://my.datadinosaur.com$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name my.datadinosaur.com;

    root /var/www/html;
    index index.php;

    ssl_certificate     /etc/letsencrypt/live/my.datadinosaur.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/my.datadinosaur.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                              always;
    add_header X-Frame-Options           "SAMEORIGIN"                           always;
    add_header X-XSS-Protection          "1; mode=block"                        always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()" always;

    # Block sensitive files
    location ~ /\.(env|git|yaml|json|sql|md|sh|ini|lock)$ { deny all; return 404; }
    location ~ ^/(src|vendor|scripts)/ { deny all; return 404; }

    # Never execute uploaded files as code (defense-in-depth; uploads are
    # validated as images, but block any script extension here too).
    location ~ ^/assets/uploads/.*\.(php|phtml|phar|cgi|pl|py|sh)$ { deny all; return 404; }

    # Static assets — long cache
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Rate-limit login API
    location = /api/auth {
        limit_req zone=login burst=3 nodelay;
        try_files $uri /index.php?$query_string;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/index.php;
    }

    # Rate-limit contact API
    location = /api/contact {
        limit_req zone=contact burst=2 nodelay;
        try_files $uri /index.php?$query_string;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/index.php;
    }

    # Kana Sensei — fully static app served from /var/www/html/kana (no backend).
    # Enforce the trailing slash so the app's relative asset paths resolve.
    location = /kana { return 301 /kana/; }
    location /kana/ {
        try_files $uri $uri/ /kana/index.html;
    }

    # MCP server (Streamable HTTP). Auth (Bearer token) is enforced inside
    # the MCP app; nginx just proxies. Buffering off + long read timeout so
    # streamed/SSE responses pass through.
    location /mcp {
        proxy_pass http://mcp:3333;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_buffering off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # All other requests
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass  php:9000;
        fastcgi_index index.php;
        include       fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_read_timeout 60;
    }
}
